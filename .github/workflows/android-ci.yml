name: Android CI

on:
  push:
    branches-ignore: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/android-ci.yml'
  pull_request:
    paths:
      - 'mobile/**'
      - '.github/workflows/android-ci.yml'
  workflow_dispatch:

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('mobile/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('mobile/android/**/*.gradle*', 'mobile/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Read SDK versions from project config
        id: sdk-versions
        working-directory: mobile/android
        run: |
          COMPILE_SDK=$(grep 'compileSdkVersion' variables.gradle | grep -oP '\d+')
          echo "compile-sdk=$COMPILE_SDK" >> "$GITHUB_OUTPUT"
          echo "Using compileSdkVersion=$COMPILE_SDK from variables.gradle"

      - name: Accept licenses and install SDK components
        run: |
          yes | sdkmanager --licenses 2>&1 | tail -5
          sdkmanager "platforms;android-${{ steps.sdk-versions.outputs.compile-sdk }}"

      - name: Install Node.js dependencies
        working-directory: mobile
        run: bun install --frozen-lockfile

      - name: Sync Capacitor Android project
        working-directory: mobile
        run: bunx cap sync android

      - name: Build debug APK (compiler check)
        working-directory: mobile/android
        run: ./gradlew assembleDebug --stacktrace

      - name: Run unit tests
        working-directory: mobile/android
        run: ./gradlew test --stacktrace
