name: Branch Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to deploy'
        required: true
        type: string

concurrency:
  group: branch-deploy-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
  cancel-in-progress: true

env:
  PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}

jobs:
  build-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push web image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.web
          push: true
          tags: ghcr.io/boardsesh/boardsesh-web:pr-${{ env.PR_NUMBER }}
          build-args: |
            NEXT_PUBLIC_WS_URL=wss://${{ env.PR_NUMBER }}.ws.preview.boardsesh.com/graphql
            BASE_URL=https://${{ env.PR_NUMBER }}.preview.boardsesh.com
          cache-from: |
            type=gha,scope=web-pr-${{ env.PR_NUMBER }}
            type=gha,scope=web-main
          cache-to: type=gha,mode=max,scope=web-pr-${{ env.PR_NUMBER }}

      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: ghcr.io/boardsesh/boardsesh-daemon:pr-${{ env.PR_NUMBER }}
          cache-from: |
            type=gha,scope=backend-pr-${{ env.PR_NUMBER }}
            type=gha,scope=backend-main
          cache-to: type=gha,mode=max,scope=backend-pr-${{ env.PR_NUMBER }}

  deploy:
    needs: build-images
    runs-on: [self-hosted, homelab, ephemeral]
    steps:
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Deploy preview containers
        env:
          PR_NUM: ${{ env.PR_NUMBER }}
          NETWORK: branch-deploys
          DATABASE_URL: ${{ secrets.BRANCH_DEPLOY_DATABASE_URL }}
        run: |
          # Stop/remove old containers
          docker stop web-pr-${PR_NUM} backend-pr-${PR_NUM} 2>/dev/null || true
          docker rm web-pr-${PR_NUM} backend-pr-${PR_NUM} 2>/dev/null || true

          # Pull new images
          docker pull ghcr.io/boardsesh/boardsesh-web:pr-${PR_NUM}
          docker pull ghcr.io/boardsesh/boardsesh-daemon:pr-${PR_NUM}

          # Start backend
          docker run -d \
            --name backend-pr-${PR_NUM} \
            --network ${NETWORK} \
            -e "DATABASE_URL=${DATABASE_URL}" \
            -e REDIS_URL=redis://redis:6379 \
            -e PORT=8080 \
            -e BOARDSESH_URL=https://${PR_NUM}.preview.boardsesh.com \
            -e NEXTAUTH_SECRET=branch-deploy-secret-${PR_NUM} \
            -e NODE_ENV=production \
            --label "traefik.enable=true" \
            --label "traefik.http.routers.backend-pr-${PR_NUM}.rule=Host(\`${PR_NUM}.ws.preview.boardsesh.com\`)" \
            --label "traefik.http.services.backend-pr-${PR_NUM}.loadbalancer.server.port=8080" \
            --memory=256m \
            --restart unless-stopped \
            ghcr.io/boardsesh/boardsesh-daemon:pr-${PR_NUM}

          # Start web
          docker run -d \
            --name web-pr-${PR_NUM} \
            --network ${NETWORK} \
            -e "DATABASE_URL=${DATABASE_URL}" \
            -e NEXTAUTH_SECRET=branch-deploy-secret-${PR_NUM} \
            -e NEXTAUTH_URL=https://${PR_NUM}.preview.boardsesh.com \
            -e IRON_SESSION_PASSWORD='{"1":"branch-deploy-session-must-be-32-chars!!"}' \
            -e BACKEND_INTERNAL_URL=ws://backend-pr-${PR_NUM}:8080/graphql \
            -e VERCEL_ENV=preview \
            -e NODE_ENV=production \
            --label "traefik.enable=true" \
            --label "traefik.http.routers.web-pr-${PR_NUM}.rule=Host(\`${PR_NUM}.preview.boardsesh.com\`)" \
            --label "traefik.http.services.web-pr-${PR_NUM}.loadbalancer.server.port=3000" \
            --memory=512m \
            --restart unless-stopped \
            ghcr.io/boardsesh/boardsesh-web:pr-${PR_NUM}

      - name: Wait for containers to be healthy
        env:
          PR_NUM: ${{ env.PR_NUMBER }}
        run: |
          echo "Waiting for containers to start..."
          sleep 10
          docker ps --filter "name=web-pr-${PR_NUM}" --filter "name=backend-pr-${PR_NUM}" --format "table {{.Names}}\t{{.Status}}"

  # Note: deployment tracking only runs for pull_request events.
  # Manual workflow_dispatch deploys skip deployment creation since there's no PR to attach to.
  create-deployment:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      deployments: write
    outputs:
      deployment_id: ${{ steps.create.outputs.deployment_id }}
    steps:
      - name: Create deployment
        id: create
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DEPLOYMENT_ID=$(gh api repos/${{ github.repository }}/deployments \
            --method POST \
            --field ref="${{ github.sha }}" \
            --field environment="preview-pr-${{ env.PR_NUMBER }}" \
            --field description="Preview deployment for PR #${{ env.PR_NUMBER }}" \
            --field auto_merge=false \
            --field required_contexts='[]' \
            --jq '.id')
          if [ -z "$DEPLOYMENT_ID" ]; then
            echo "Failed to create deployment"
            exit 1
          fi
          echo "deployment_id=${DEPLOYMENT_ID}" >> "$GITHUB_OUTPUT"

      - name: Set deployment status to in_progress
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/deployments/${{ steps.create.outputs.deployment_id }}/statuses \
            --method POST \
            --field state="in_progress" \
            --field description="Building and deploying preview..."

  deployment-status:
    needs: [deploy, create-deployment]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      deployments: write
    steps:
      - name: Set deployment status to success
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/deployments/${{ needs.create-deployment.outputs.deployment_id }}/statuses \
            --method POST \
            --field state="success" \
            --field environment_url="https://${{ env.PR_NUMBER }}.preview.boardsesh.com" \
            --field description="Preview is live" \
            --field auto_inactive=true

  deployment-failure:
    needs: [deploy, create-deployment]
    if: github.event_name == 'pull_request' && failure() && needs.create-deployment.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      deployments: write
    steps:
      - name: Set deployment status to failure
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/deployments/${{ needs.create-deployment.outputs.deployment_id }}/statuses \
            --method POST \
            --field state="failure" \
            --field description="Deployment failed"
