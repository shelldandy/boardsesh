name: iOS CI

on:
  push:
    branches-ignore: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/ios-ci.yml'
  pull_request:
    paths:
      - 'mobile/**'
      - '.github/workflows/ios-ci.yml'
  workflow_dispatch:

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-15
    timeout-minutes: 30

    env:
      WORKSPACE_PATH: mobile/ios/App/App.xcworkspace
      SCHEME: App

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('mobile/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: mobile/ios/App/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('mobile/ios/App/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install Node.js dependencies
        working-directory: mobile
        run: bun install --frozen-lockfile

      - name: Sync Capacitor iOS project
        working-directory: mobile
        run: bunx cap sync ios

      - name: Install CocoaPods dependencies
        working-directory: mobile/ios/App
        run: pod install

      - name: Resolve simulator destination
        id: simulator
        run: |
          # Pick the first booted iPhone, or boot one from the latest available runtime
          DEVICE_NAME=$(xcrun simctl list devices available -j \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime in sorted(data['devices'].keys(), reverse=True):
              if 'iOS' not in runtime:
                  continue
              for d in data['devices'][runtime]:
                  if 'iPhone' in d['name'] and d['isAvailable']:
                      print(d['name'])
                      sys.exit(0)
          sys.exit(1)
          ")
          echo "device=$DEVICE_NAME" >> "$GITHUB_OUTPUT"
          echo "Using simulator: $DEVICE_NAME"

      - name: Build for testing (compiler check)
        run: |
          xcodebuild build-for-testing \
            -workspace "$WORKSPACE_PATH" \
            -scheme "$SCHEME" \
            -destination 'platform=iOS Simulator,name=${{ steps.simulator.outputs.device }},OS=latest' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Run unit tests
        run: |
          xcodebuild test-without-building \
            -workspace "$WORKSPACE_PATH" \
            -scheme "$SCHEME" \
            -destination 'platform=iOS Simulator,name=${{ steps.simulator.outputs.device }},OS=latest'
