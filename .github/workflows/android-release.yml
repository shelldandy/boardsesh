name: Android Release Build

on:
  push:
    paths:
      - 'mobile/**'
      - '.github/workflows/android-release.yml'
  pull_request:
    paths:
      - 'mobile/**'
      - '.github/workflows/android-release.yml'
  workflow_dispatch:

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Install Node.js dependencies
        working-directory: mobile
        run: bun install --frozen-lockfile

      - name: Sync Capacitor Android project
        working-directory: mobile
        run: bunx cap sync android

      - name: Set version code
        working-directory: mobile/android
        run: |
          sed -i "s/versionCode [0-9]*/versionCode ${{ github.run_number }}/" app/build.gradle
          echo "Version code set to ${{ github.run_number }}"

      - name: Build debug APK
        working-directory: mobile/android
        run: ./gradlew assembleDebug

      - name: Decode keystore
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > mobile/android/app/release.keystore

      - name: Build signed APK
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        working-directory: mobile/android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$PWD/app/release.keystore \
            -Pandroid.injected.signing.store.password="$ANDROID_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$ANDROID_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$ANDROID_KEY_PASSWORD"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: boardsesh-android-debug-${{ github.run_number }}
          path: mobile/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload release APK
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: boardsesh-android-release-${{ github.run_number }}
          path: mobile/android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-build-${{ github.run_number }}
          name: Android Build ${{ github.run_number }}
          body: |
            Android APK build from commit ${{ github.sha }}.

            **Build number:** ${{ github.run_number }}
            **Minimum Android version:** 13 (API 33)

            Download the APK below and sideload on your Android device.
          files: mobile/android/app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up keystore
        if: always()
        run: rm -f mobile/android/app/release.keystore
