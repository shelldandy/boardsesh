[package]
name = "board-renderer-wasm"
version = "0.1.0"
edition = "2024"
description = "WASM board overlay renderer for Boardsesh climbing app"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
tiny-skia = "0.11"
wasm-bindgen = "0.2"
js-sys = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# PNG encoding -- pure Rust, compiles to WASM without C dependencies.
# For mostly-transparent overlay images (~10 circles), PNG is 2-5KB.
# Board background images are separately converted to WebP via cwebp CLI.
png = "0.17"

[profile.release]
opt-level = "s"     # Optimize for small WASM binary size
lto = true
