[package]
name = "board-renderer-wasm"
version = "0.1.0"
edition = "2024"
description = "WASM board overlay renderer for Boardsesh climbing app"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
tiny-skia = "0.11"
wasm-bindgen = "0.2"
js-sys = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[profile.release]
opt-level = 3       # Optimize for speed (rendering perf > binary size)
lto = true
